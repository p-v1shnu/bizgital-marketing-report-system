<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insight Capture Settings</title>
    <style>
      body {
        margin: 0;
        padding: 14px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, sans-serif;
        background: #091326;
        color: #f8fafc;
        min-width: 360px;
      }
      .card {
        background: #0a162b;
        border: 1px solid #2b415f;
        border-radius: 10px;
        padding: 12px;
      }
      h3 {
        margin: 0 0 6px;
        font-size: 18px;
      }
      .muted {
        color: #9eb3cf;
        font-size: 12px;
      }
      .field {
        display: grid;
        gap: 6px;
        margin-top: 12px;
      }
      label {
        font-size: 12px;
        color: #9eb3cf;
      }
      input {
        font: inherit;
        border-radius: 8px;
        border: 1px solid #355172;
        padding: 8px 10px;
        background: #081325;
        color: #f8fafc;
      }
      .actions {
        margin-top: 12px;
        display: flex;
        gap: 8px;
      }
      button {
        font: inherit;
        border-radius: 8px;
        border: 1px solid #355172;
        padding: 8px 12px;
        background: #123458;
        color: #fff;
        cursor: pointer;
      }
      button.primary {
        background: #1d9bf0;
        border-color: #1d9bf0;
      }
      #statusLine {
        margin-top: 10px;
        min-height: 18px;
      }
      .ok {
        color: #52e3a4;
      }
      .error {
        color: #f79a9a;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h3>Settings</h3>
      <div class="muted">Set app origin for workspace links.</div>

      <div class="field">
        <label for="appOriginInput">App origin</label>
        <input id="appOriginInput" type="text" placeholder="https://report.bizgital.com" />
      </div>

      <div class="actions">
        <button id="resetBtn" type="button">Reset Default</button>
        <button id="saveBtn" class="primary" type="button">Save</button>
      </div>

      <div id="statusLine" class="muted"></div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
